<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AMA Fun Poll – Scan to Join!</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    height:100%;
    overflow:hidden;
  }

  body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(135deg,#0071ce 0%,#004f9e 40%,#003580 100%);
    position:relative;
  }

  /* background blobs */
  body::before{
    content:'';position:absolute;width:600px;height:600px;border-radius:50%;
    background:rgba(255,194,32,0.08);top:-150px;right:-150px;
    animation:float1 8s ease-in-out infinite;pointer-events:none;
  }
  body::after{
    content:'';position:absolute;width:400px;height:400px;border-radius:50%;
    background:rgba(255,255,255,0.05);bottom:-100px;left:-100px;
    animation:float2 10s ease-in-out infinite;pointer-events:none;
  }
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,30px) scale(1.05)}}
  @keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.08)}}

  /* ── MAIN LAYOUT: side by side ── */
  .container{
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:56px;
    padding:32px 48px;
    position:relative;
    z-index:1;
    width:140%;
    max-width:1400px;
    height:100vh;
  }

  /* ── LEFT: QR CARD ── */
  .qr-card{
    background:#ffffff;
    border-radius:24px;
    padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3),0 0 0 5px rgba(255,255,255,0.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    animation:slideIn 0.7s ease both 0.2s;
    position:relative;
    flex-shrink:0;
  }
  .qr-card::before{
    content:'';position:absolute;inset:-3px;border-radius:27px;
    background:linear-gradient(135deg,#ffc220,#0071ce);z-index:-1;opacity:0.65;
  }
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

  .qr-img{
    width:clamp(330px,32vw,420px);
    height:clamp(330px,32vw,420px);
    display:block;
    border-radius:10px;
    border:2px solid rgba(0,113,206,0.1);
  }

  .scan-hint{
    display:flex;align-items:center;gap:8px;
    background:rgba(0,113,206,0.07);border:1.5px solid rgba(0,113,206,0.18);
    padding:8px 18px;border-radius:30px;
    font-size:13px;font-weight:600;color:#0071ce;white-space:nowrap;
  }
  .scan-hint span{animation:blink 2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

  /* ── RIGHT: TEXT CONTENT ── */
  .info-side{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:22px;
    flex:1;
    min-width:0;
    animation:slideRight 0.7s ease both 0.3s;
  }
  @keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

  /* emoji */
  .emoji-row{
    font-size:42px;
    letter-spacing:6px;
    animation:pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both 0.1s;
  }
  @keyframes pop{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}

  /* single-line title */
  .main-title{
    font-family:'Syne',sans-serif;
    font-size:clamp(20px,2.4vw,32px);
    font-weight:900;
    color:#ffffff;
    line-height:1.2;
    letter-spacing:-0.3px;
    text-shadow:0 2px 20px rgba(0,0,0,0.2);
    white-space:nowrap;
  }
  .main-title em{font-style:normal;color:#ffc220}

  .sub-title{
    font-size:clamp(14px,1.6vw,18px);
    color:rgba(255,255,255,0.78);
    font-weight:500;
    line-height:1.4;
  }

  /* divider */
  .divider{
    width:60px;height:4px;
    background:linear-gradient(90deg,#ffc220,rgba(255,194,32,0.2));
    border-radius:4px;
  }

  /* URL block */
  .url-block{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .url-label{
    font-size:12px;color:rgba(255,255,255,0.55);
    font-weight:500;text-transform:uppercase;letter-spacing:0.1em;
  }
  .url-text{
    font-family:'Syne',sans-serif;
    font-size:clamp(16px,2vw,26px);
    font-weight:800;
    color:#ffc220;
    letter-spacing:0.01em;
  }

  /* button */
  .open-btn{
    display:inline-flex;align-items:center;gap:10px;
    background:#ffc220;color:#1a1a2e;
    text-decoration:none;
    padding:16px 36px;border-radius:50px;
    font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
    letter-spacing:0.02em;
    box-shadow:0 6px 24px rgba(255,194,32,0.4);
    transition:transform 0.2s,box-shadow 0.2s;
  }
  .open-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(255,194,32,0.5)}
  .open-btn:active{transform:translateY(0)}

  /* footer */
  .footer-note{
    font-size:12px;color:rgba(255,255,255,0.38);
    margin-top:4px;
  }
</style>
</head>
<body>

<div class="container">

  <!-- LEFT: QR CODE -->
  <div class="qr-card">
    <img class="qr-img" src="ama-qr-code.png" alt="QR Code – AMA Fun Poll"/>
    <div class="scan-hint">
      <span>📱</span> Point your camera here to open the poll
    </div>
  </div>

  <!-- RIGHT: TEXT -->
  <div class="info-side">
    <div class="emoji-row">🎉 🙋 📊</div>

    <div class="main-title">
      Please take this <em>fun AMA survey</em> <br>as you take your seats!</br>
    </div>

    <div class="sub-title">Scan the QR code or open the link on your device</div>

    <div class="divider"></div>

    <div class="url-block">
      <div class="url-label">Or open directly in your browser</div>
      <div class="url-text">amafun2026.github.io/amafuntime/</div>
    </div>

    <a class="open-btn" href="https://amafun2026.github.io/amafuntime/dashboard.html" target="_blank" rel="noopener">
      🔗 Open Poll Now
    </a>

    <div class="footer-note">Your responses are anonymous · Powered by AMA Fun 2026</div>
  </div>

</div>

</body>
</html>
